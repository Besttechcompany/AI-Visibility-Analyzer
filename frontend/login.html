<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | AI Visibility Analyzer</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <div class="login-card">

        <h1>Welcome Back</h1>

        <p>
            Sign in with your Google account to access your AI Visibility Dashboard.
        </p>

        <button
            class="google-btn"
            onclick="googleLogin()">

            <img
                src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                alt="Google Logo">

            <span>Continue with Google</span>

        </button>

        <a href="index.html" class="back-home">

            ← Back to Home

        </a>

    </div>

    <!-- Loading Overlay -->

    <div id="loadingOverlay" class="loading-overlay">

        <div class="loader-card">

            <div class="ai-logo">🤖</div>

            <h2>AI Visibility Analyzer</h2>

            <div class="spinner"></div>

            <h3 id="loadingMessage">

                Initializing Secure Login...

            </h3>

            <div class="loading-bar">

                <div
                    id="loadingProgress"
                    class="loading-progress">
                </div>

            </div>

        </div>

    </div>

<script>

function googleLogin(){

    document.getElementById("loadingOverlay").style.display="flex";

    const messages=[

        "Initializing Secure Login...",

        "Connecting to Google...",

        "Verifying Authentication...",

        "Redirecting to Google..."

    ];

    let progress=0;

    const progressBar=document.getElementById("loadingProgress");

    const message=document.getElementById("loadingMessage");

    const timer=setInterval(()=>{

        progress++;

        progressBar.style.width=progress+"%";

        if(progress==20){

            message.innerHTML=messages[1];

        }

        if(progress==45){

            message.innerHTML=messages[2];

        }

        if(progress==75){

            message.innerHTML=messages[3];

        }

        if(progress>=100){

            clearInterval(timer);

            window.location.href="https://ai-visibility-analyzer.onrender.com/google/login";

        }

    },18);

}

</script>

</body>

</html>
